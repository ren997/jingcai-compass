# Copy to application-local.yml (git-ignored) and fill in cloud/dev credentials.
# Default profile is local; Spring Boot loads this overlay automatically.

spring:
  datasource:
    url: jdbc:postgresql://<cloud-host>:<port>/<database>
    username: <username>
    password: <password>
  data:
    redis:
      host: <cloud-host>
      port: <port>
      password: <password>

app:
  pagination:
    max-page-size: 100
  # 离线联调可将 sporttery/asian-odds.provider 都设为 stub（classpath:stub/** fixtures）
  sporttery:
    provider: china
    base-url: https://webapi.sporttery.cn
    connect-timeout: 5s
    read-timeout: 10s
    retry:
      max-attempts: 2
      delay: 500ms
    quota-warning-threshold: 0
  asian-odds:
    provider: stub
    base-url: https://api.the-odds-api.com
    api-key: <api-key>
    connect-timeout: 5s
    read-timeout: 10s
    retry:
      max-attempts: 2
      delay: 500ms
    quota-warning-threshold: 0
  tasks:
    enabled: false
    sporttery-pool:
      enabled: false
      fixed-delay: 15m
      initial-delay: 30s
