spring:
  application:
    name: jingcai-compass-backend
  profiles:
    active: local
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html

app:
  pagination:
    max-page-size: ${MAX_PAGE_SIZE:100}
  sporttery:
    provider: ${SPORTTERY_PROVIDER:china}
    base-url: ${SPORTTERY_BASE_URL:https://webapi.sporttery.cn}
    connect-timeout: ${SPORTTERY_CONNECT_TIMEOUT:5s}
    read-timeout: ${SPORTTERY_READ_TIMEOUT:10s}
    retry:
      max-attempts: ${SPORTTERY_RETRY_MAX_ATTEMPTS:2}
      delay: ${SPORTTERY_RETRY_DELAY:500ms}
    quota-warning-threshold: ${SPORTTERY_QUOTA_WARNING_THRESHOLD:0}
  asian-odds:
    provider: ${ASIAN_ODDS_PROVIDER:stub}
    base-url: ${ASIAN_ODDS_BASE_URL:https://api.the-odds-api.com}
    api-key: ${ASIAN_ODDS_API_KEY:}
    connect-timeout: ${ASIAN_ODDS_CONNECT_TIMEOUT:5s}
    read-timeout: ${ASIAN_ODDS_READ_TIMEOUT:10s}
    retry:
      max-attempts: ${ASIAN_ODDS_RETRY_MAX_ATTEMPTS:2}
      delay: ${ASIAN_ODDS_RETRY_DELAY:500ms}
    quota-warning-threshold: ${ASIAN_ODDS_QUOTA_WARNING_THRESHOLD:0}
  tasks:
    enabled: ${SYNC_TASKS_ENABLED:false}
    sporttery-pool:
      enabled: ${SPORTTERY_POOL_TASK_ENABLED:false}
      fixed-delay: ${SPORTTERY_POOL_FIXED_DELAY:15m}
      initial-delay: ${SPORTTERY_POOL_INITIAL_DELAY:30s}
    asian-odds:
      enabled: ${ASIAN_ODDS_TASK_ENABLED:false}
      fixed-delay: ${ASIAN_ODDS_FIXED_DELAY:20m}
      initial-delay: ${ASIAN_ODDS_INITIAL_DELAY:45s}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
